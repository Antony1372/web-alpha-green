<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Alfa Green</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Alfa Green</a>
            <ul class="nav-links">
                <li><a href="servicios-tecnicos.html">Servicios Técnicos</a></li>
                <li><a href="energia-sustentable.html">Energía Sustentable</a></li>
                <li><a href="casos-exito.html">Casos de Éxito</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 style="text-align: center;">Solicitud de Consultoría</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Complete el formulario y nuestro equipo de ventas lo contactará a la brevedad.</p>
        
        <form action="javascript:alert('Envío Exitoso');">
            <div class="form-group">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="empresa">Nombre de la empresa *</label>
                <input type="text" id="empresa" name="empresa" required>
            </div>
            
            <div class="form-group">
                <label for="correo">Correo electrónico *</label>
                <input type="email" id="correo" name="correo" placeholder="usuario@dominio.cl" required>
            </div>
            
            <div class="form-group">
                <label for="servicio">Tipo de servicio *</label>
                <select id="servicio" name="servicio" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="Estrategias">Estrategias</option>
                    <option value="Investigacion">Investigación</option>
                    <option value="Integracion">Integración</option>
                    <option value="Consulta General">Consulta General</option>
                </select>
            </div>
            
            <button type="submit" class="btn" style="margin-top: 1rem;">Enviar Solicitud</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Alfa Green. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
